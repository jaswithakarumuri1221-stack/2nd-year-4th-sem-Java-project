<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Programming Quiz Arena</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1 class="title"> Programming Quiz Arena </h1>

<div id="startScreen">

<h2>Select Language</h2>

<div class="languages">

<button onclick="startQuiz('java')">☕ Java</button>
<button onclick="startQuiz('c')">💻 C</button>
<button onclick="startQuiz('cpp')">⚙️ C++</button>
<button onclick="startQuiz('python')">🐍 Python</button>
<button onclick="startQuiz('js')">🟨 JavaScript</button>

</div>

</div>


<div id="quizScreen" class="hidden">

<div class="topBar">

<div class="progress">
<div id="progressBar"></div>
</div>

<div id="timer">30s</div>

</div>

<h2 id="question"></h2>

<div id="options"></div>

<button id="nextBtn" onclick="nextQuestion()">Next</button>

</div>


<div id="resultScreen" class="hidden"></div>

</div>

<script src="script.js"></script>

</body>
</html>
